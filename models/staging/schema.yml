version: 2

models: 
  - name: stg_nations
    columns:
      - name: nation_id
        data_tests: 
          - unique
            

  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          
  - name: stg_regions
    columns:
      - name: name
        data_tests:          
          - accepted_values:
              arguments:
                values: ['AFRICA','AMERICA','ASIA','EUROPE','MIDDLE EAST']
                
      - name: region_id
        data_tests:  
          - relationships:
              arguments: 
                to: ref('stg_regions')
                field: region_id

      
          
      
          

  
          
          